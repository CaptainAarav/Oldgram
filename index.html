<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="index.css" />
    <title>Oldgram</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <img id="logo" src="images/logo.png" alt="Oldgram" />
        <img
          class="user-avatar"
          src="images/user-avatar.png"
          alt="User Avatar"
        />
      </header>
      <main>
        <section class="post">
          <div class="user-info">
            <img
              id="post-avatar"
              class="user-avatar"
              src="images/avatar-vangogh.jpg"
              alt="User Avatar"
            />
            <div class="user-info-text">
              <h3 class="user-name">Vincent van Gogh</h3>
              <p class="user-location">Zundert, Netherlands</p>
            </div>
          </div>
          <img
            class="post-image"
            src="images/post-vangogh.jpg"
            alt="Post Image"
          />
          <div class="likes-and-comments">
            <img
              class="like-icon"
              src="images/icon-heart.png"
              alt="Like Icon"
            />
            <img
              class="comment-icon"
              src="images/icon-comment.png"
              alt="Comment Icon"
            />
            <img class="share-icon" src="images/icon-dm.png" alt="Share Icon" />
          </div>
          <p class="likes-count">21,492 likes</p>
          <div class="comment-section">
            <p class="comment-text">
              <strong>vincey1853</strong> just took a few mushrooms lol
            </p>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
